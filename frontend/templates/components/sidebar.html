<main class="liquid-sidebar-layout" aria-label="Área de automações">
    <input class="liquid-sidebar-state" type="radio" name="liquid-sidebar-panel" id="panel-automation-1" checked>  
    <input class="liquid-sidebar-state" type="radio" name="liquid-sidebar-panel" id="panel-automation-2">  
    <input class="liquid-sidebar-state" type="radio" name="liquid-sidebar-panel" id="panel-automation-3">  
    <input class="liquid-sidebar-state" type="radio" name="liquid-sidebar-panel" id="panel-automation-4">  
    <input class="liquid-sidebar-state" type="radio" name="liquid-sidebar-panel" id="panel-automation-5">  
    <input class="liquid-sidebar-state" type="radio" name="liquid-sidebar-panel" id="panel-automation-6">  
    <input class="liquid-sidebar-state" type="radio" name="liquid-sidebar-panel" id="panel-automation-7">  
    <input class="liquid-sidebar-state" type="radio" name="liquid-sidebar-panel" id="panel-automation-8">  
    <input class="liquid-sidebar-state" type="radio" name="liquid-sidebar-panel" id="panel-automation-9">  
    <input class="liquid-sidebar-state" type="radio" name="liquid-sidebar-panel" id="panel-automation-10">  
    <input class="liquid-sidebar-state" type="radio" name="liquid-sidebar-panel" id="panel-automation-11">  
    <input class="liquid-sidebar-state" type="radio" name="liquid-sidebar-panel" id="panel-automation-12">  
    <input class="liquid-sidebar-state" type="radio" name="liquid-sidebar-panel" id="panel-automation-13">  
    <input class="liquid-sidebar-state" type="radio" name="liquid-sidebar-panel" id="panel-automation-14">  
    <input class="liquid-sidebar-state" type="radio" name="liquid-sidebar-panel" id="panel-automation-15">  

    <aside class="liquid-sidebar" aria-label="Menu de automações">
        <div class="liquid-sidebar__header">
            <span class="liquid-sidebar__eyebrow">Menu</span>
            <h2>Automações</h2>
        </div>

        <nav class="liquid-sidebar__nav" aria-label="Lista de automações">
            <label class="liquid-sidebar__item" for="panel-automation-1">3.11 - Status Wave + oLPN</label>
            <label class="liquid-sidebar__item" for="panel-automation-2">1.06 - Recebimento</label>
            <label class="liquid-sidebar__item" for="panel-automation-3">1.05 - Pendência de fechamento de ASN</label>
            <label class="liquid-sidebar__item" for="panel-automation-4">4.05 - Relatório de Produtividade - Picking</label>
            <label class="liquid-sidebar__item" for="panel-automation-5">5.03 - Produtividade de Packing - Packed por hora</label>
            <label class="liquid-sidebar__item" for="panel-automation-6">5.04 - Produtividade Load - Load por hora</label>
            <label class="liquid-sidebar__item" for="panel-automation-7">6.06 - Expedição - CD-</label>
            <label class="liquid-sidebar__item" for="panel-automation-8">6.10 - Pedidos Cancelados</label>
            <label class="liquid-sidebar__item" for="panel-automation-9">6.15 - Produtividade - Outbound Putaway</label>
            <label class="liquid-sidebar__item" for="panel-automation-10">7.05 - Movimentação de estoque</label>
            <label class="liquid-sidebar__item" for="panel-automation-11">2.02 - Pendencia de Armazenagem</label>
            <label class="liquid-sidebar__item" for="panel-automation-12">7.03 - iLPNs Sem Local</label>
            <label class="liquid-sidebar__item" for="panel-automation-13">9.05 - Relatórios PIX</label>
            <label class="liquid-sidebar__item" for="panel-automation-14">9.01 - Ajustes de Avarias</label>
            <label class="liquid-sidebar__item" for="panel-automation-15">Automação 15</label>
        </nav>
    </aside>

    <section class="liquid-sidebar-frame" aria-live="polite">
        <article class="liquid-sidebar-panel liquid-sidebar-panel--status">
            <div class="liquid-sidebar-panel__header">
                <span>3.11</span>
                <h1>Status oLPN</h1>
                <p>Informe os filtros abaixo para consultar o status das oLPNs.</p>
            </div>

            <form class="liquid-form">
                <label>
                    Filial
                    <input type="text" name="filial" placeholder="Digite a filial">
                </label>
                <label>
                    Data Início
                    <input type="date" name="data_inicio">
                </label>
                <label>
                    Data Final
                    <input type="date" name="data_final">
                </label>
                <button type="button">Executar automação</button>
            </form>
        </article>

        {% for automation in range(2, 16) %}
        <article class="liquid-sidebar-panel liquid-sidebar-panel--automation-{{ automation }}">
            <div class="liquid-sidebar-panel__header">
                <span>Automação {{ automation }}</span>
                <h1>Automação {{ automation }}</h1>
                <p>Preencha as informações necessárias para esta automação.</p>
            </div>

            <form class="liquid-form">
                <label>
                    Filial
                    <input type="text" name="filial_{{ automation }}" placeholder="Digite a filial">
                </label>
                <label>
                    Template
                    <input type="text" name="template_{{ automation }}" placeholder="Digite o template">
                </label>
                <button type="button">Executar automação</button>
            </form>
        </article>
        {% endfor %}
    </section>
</main>
<script src="frontend/static/js/sidebar.js"></script>
